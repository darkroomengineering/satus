# Dependabot configuration
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates
#
# Patch/minor bumps that pass the Test workflow are auto-merged by
# .github/workflows/automerge-dependabot.yml. Major bumps stay open
# for human review.

version: 2
updates:
  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci"

  # npm / bun runtime + dev deps
  # Each dependency is raised as its own PR so the auto-merge workflow
  # can parse the "from A to B" version transition from the PR title.
  # Grouping the updates would defeat the auto-merge title parser.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 10
    # hamo and tempus are first-party Darkroom packages with no stable v1 yet
    # (npm only carries 1.0.0-dev.* prereleases, and the `latest` dist-tag lags
    # behind the dev versions we depend on). They are pinned to exact dev
    # versions and bumped manually — automating them would auto-merge
    # prereleases or chase a nonexistent stable release. See #157.
    ignore:
      - dependency-name: "hamo"
      - dependency-name: "tempus"
