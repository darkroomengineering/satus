# Dependabot configuration
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates
#
# Patch/minor bumps that pass the Test workflow are auto-merged by
# .github/workflows/automerge-dependabot.yml. Major bumps stay open
# for human review.

version: 2
updates:
  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci"

  # npm / bun runtime + dev deps
  # Each dependency is raised as its own PR so the auto-merge workflow
  # can parse the "from A to B" version transition from the PR title.
  # Grouping the updates would defeat the auto-merge title parser.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 10
