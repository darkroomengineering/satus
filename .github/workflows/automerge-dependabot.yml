name: Auto-merge Dependabot

# Auto-merge Dependabot PRs once the Test workflow passes.
# Patch/minor bumps only — major bumps require human review.
#
# Triggers on workflow_run (after Test completes) instead of pull_request,
# so we can read Test's conclusion before merging. Previously this used
# `gh pr merge --admin`, which bypassed status checks entirely and could
# merge bumps even when tests failed.

on:
  workflow_run:
    workflows: ["Test"]
    types: [completed]

permissions:
  pull-requests: write
  contents: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    # Only act when the triggering Test run succeeded AND it was for a
    # Dependabot pull_request. workflow_run.actor.login is the actor who
    # caused the underlying event — for Dependabot PRs that's `dependabot[bot]`.
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.actor.login == 'dependabot[bot]'
    steps:
      - name: Resolve PR number from head SHA
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          REPO: ${{ github.repository }}
        run: |
          number=$(gh pr list --repo "$REPO" --state open \
            --search "sha:$HEAD_SHA" \
            --json number --jq '.[0].number // empty')
          if [ -z "$number" ]; then
            echo "No open PR for sha $HEAD_SHA — nothing to do."
            exit 0
          fi
          echo "number=$number" >> "$GITHUB_OUTPUT"

      - name: Detect major bump from PR title
        id: update_type
        if: steps.pr.outputs.number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR: ${{ steps.pr.outputs.number }}
        run: |
          # Dependabot encodes the version transition in the title:
          #   "chore(deps): bump X from 1.2.3 to 1.3.0"
          #   "ci: bump actions/x from 8 to 9"
          # If we can't parse a single "from A to B" pair (grouped multi-pkg
          # bumps, etc.), bail safe — major detection is the gate.
          title=$(gh pr view "$PR" --repo "$REPO" --json title --jq '.title')
          versions=$(echo "$title" | grep -oE 'from [0-9][0-9.]* to [0-9][0-9.]*' | head -1)
          if [ -z "$versions" ]; then
            echo "Cannot parse single version transition from title: $title"
            echo "Not auto-merging (likely a grouped bump — needs human review)."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          from=$(echo "$versions" | awk '{print $2}')
          to=$(echo "$versions" | awk '{print $4}')
          from_major=$(echo "$from" | cut -d. -f1)
          to_major=$(echo "$to" | cut -d. -f1)
          if [ "$from_major" != "$to_major" ]; then
            echo "Major bump: $from -> $to. Skipping (requires human review)."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Patch/minor bump: $from -> $to. Eligible for auto-merge."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Squash merge
        if: >
          steps.pr.outputs.number != '' &&
          steps.update_type.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR: ${{ steps.pr.outputs.number }}
        run: |
          gh pr merge "$PR" --repo "$REPO" --squash --delete-branch
