name: Auto-merge Dependabot

# Auto-merge Dependabot PRs once the CI workflow passes.
# Patch/minor bumps only — major bumps require human review.
#
# Triggers on workflow_run (after CI completes) instead of pull_request,
# so we can read CI's conclusion before merging and squash-merge through
# `gh pr merge` — status checks stay enforced.

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  pull-requests: write
  contents: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    # Only act when the triggering CI run succeeded for a pull_request.
    # The Dependabot check happens on the PR *author* below, NOT on
    # workflow_run.actor: once the lockfile-sync workflow pushes a bun.lock
    # commit to a Dependabot branch, the subsequent CI run's actor is the
    # PAT identity — gating on actor would permanently skip exactly the
    # PRs this automation exists for.
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    steps:
      - name: Resolve Dependabot PR from head SHA
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          REPO: ${{ github.repository }}
        run: |
          pr_json=$(gh pr list --repo "$REPO" --state open \
            --search "sha:$HEAD_SHA" \
            --json number,author --jq '.[0] // empty')
          if [ -z "$pr_json" ]; then
            echo "No open PR for sha $HEAD_SHA — nothing to do."
            exit 0
          fi
          author=$(echo "$pr_json" | jq -r '.author.login')
          if [ "$author" != "app/dependabot" ] && [ "$author" != "dependabot" ]; then
            echo "PR author is $author, not Dependabot — nothing to do."
            exit 0
          fi
          echo "number=$(echo "$pr_json" | jq -r '.number')" >> "$GITHUB_OUTPUT"

      - name: Detect major bump from PR title
        id: update_type
        if: steps.pr.outputs.number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR: ${{ steps.pr.outputs.number }}
        run: |
          # Dependabot encodes the version transition in the title:
          #   "chore(deps): bump X from 1.2.3 to 1.3.0"
          #   "ci: bump actions/x from 8 to 9"
          # If we can't parse a single "from A to B" pair (grouped multi-pkg
          # bumps, etc.), bail safe — major detection is the gate.
          title=$(gh pr view "$PR" --repo "$REPO" --json title --jq '.title')
          versions=$(echo "$title" | grep -oE 'from [0-9][0-9.]* to [0-9][0-9.]*' | head -1)
          if [ -z "$versions" ]; then
            echo "Cannot parse single version transition from title: $title"
            echo "Not auto-merging (likely a grouped bump — needs human review)."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          from=$(echo "$versions" | awk '{print $2}')
          to=$(echo "$versions" | awk '{print $4}')
          from_major=$(echo "$from" | cut -d. -f1)
          to_major=$(echo "$to" | cut -d. -f1)
          if [ "$from_major" != "$to_major" ]; then
            echo "Major bump: $from -> $to. Skipping (requires human review)."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Patch/minor bump: $from -> $to. Eligible for auto-merge."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Squash merge
        if: >
          steps.pr.outputs.number != '' &&
          steps.update_type.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR: ${{ steps.pr.outputs.number }}
        run: |
          gh pr merge "$PR" --repo "$REPO" --squash --delete-branch
