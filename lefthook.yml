# Lefthook configuration for git hooks
# Cross-platform compatible (Windows, macOS, Linux)
# https://github.com/evilmartians/lefthook

pre-commit:
  parallel: true
  commands:
    biome:
      glob: '*.{js,mjs,ts,jsx,tsx,css,scss}'
      run: bun biome check --max-diagnostics=200 --write --unsafe {staged_files}
      stage_fixed: true
    typecheck:
      glob: '*.{ts,tsx}'
      # TS7 native (aliased as typescript7; the classic `typescript` package
      # serves Next's build-time API). Incremental is on: this alias is the
      # only writer of tsconfig.tsbuildinfo, and the warm cache is ~4x faster.
      run: bun node_modules/typescript7/bin/tsc --noEmit
      stage_fixed: false

# NOTE: Build checks happen in CI, not pre-push (too slow for dev workflow)
# Uncomment if you want local build verification:
# pre-push:
#   commands:
#     build-check:
#       run: bun run build
#       skip:
#         - merge
#         - rebase

# Branch switches leave the previous branch's generated route types in
# .next/types (tsconfig includes them), producing ghost tsc errors about
# routes that don't exist on the new branch. Clear them on real branch
# checkouts only — {3} is git's flag: 1 = branch switch, 0 = file checkout.
# They regenerate on the next `bun dev` / `bun run build`.
post-checkout:
  commands:
    clear-generated-types:
      skip:
        - rebase
      run: '[ "{3}" != "1" ] || rm -rf .next/types .next/dev/types'

post-merge:
  commands:
    install-deps:
      run: bun i
